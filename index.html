<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naira Spending Diary</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2e7d32" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🇳🇬 Spending Diary</h1>

      <div class="summary-grid">
        <div class="stat-card">
          Today<br /><strong>₦<span id="day-total">0</span></strong>
        </div>
        <div class="stat-card">
          Week<br /><strong>₦<span id="week-total">0</span></strong>
        </div>
        <div class="stat-card">
          Month<br /><strong>₦<span id="month-total">0</span></strong>
        </div>
      </div>

      <div class="budget-section">
        <small>Monthly Budget Progress</small>
        <div class="progress-container">
          <div id="budget-bar" class="progress-bar"></div>
        </div>
      </div>

      <div class="voice-center">
        <div id="pulse-ring"></div>
        <button id="start-btn">🎤</button>
      </div>
      <p id="status">Tap to record spending</p>

      <div class="search-box">
        <input
          type="text"
          id="search-input"
          placeholder="Search entries (e.g. Suya, Fuel)..."
        />
      </div>

      <div class="actions">
        <button id="download-btn" class="secondary-btn">📊 Export Excel</button>
      </div>

      <div class="diary-section">
        <h3>Recent Entries</h3>
        <div id="diary-list"></div>
      </div>

      <button id="clear-btn" class="danger-btn">Clear All Data</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
